random_seed: 8
split: test
image_size: 800
eval_class: all
num_instances: 1000
eval_num_instances: 200
image_mean: ${oc.select:backbone.image_mean,imagenet}
use_bbox: False
multilayer: False
note: ""

# Whether to evaluate before training (with random init)
eval_before_training: True

# Linear probe configuration
probe:
  type: identity  # "identity" for baseline verification, "linear" or "mlp"
  output_dim: null  # null means same as input_dim
  hidden_dim: null  # only used for MLP
  bias: True
  init_mode: identity  # "identity", "random", or "xavier"

# Training disabled - evaluation only with random init
train:
  enabled: False
  epochs: 0
  lr: 0.001
  weight_decay: 0.0
  temperature: 0.07
  train_all_classes: True
  num_instances: null
  eval_every: 5
  use_scheduler: False
  batch_size: 16
  num_workers: 4

defaults:
  - backbone: dinov2_b14
  - _self_

task_name: correspondence_spair_linear_probe_eval

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${task_name}_${hydra:runtime.choices.backbone}
