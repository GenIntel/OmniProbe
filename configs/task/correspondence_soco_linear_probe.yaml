name: correspondence_soco_linear_probe
random_seed: 8
data_root: ${oc.env:SOCO_ROOT,data/SOCOv1}
pair_subdir: PairAnnotations/intra
train_pair_subdir: PairAnnotations/trainsplits/train
test_pair_subdir: PairAnnotations/trainsplits/test
classes: all
max_pairs: null
image_size: 800
image_size_policy: nearest_multiple
use_bbox: false
thresh: 0.10
mask_feats: false
multilayer: false
eval_before_training: false
probe:
  type: linear
  init_mode: identity
  bias: true
train:
  enabled: true
  epochs: 4
  lr: 0.001
  batch_size: 32
  num_workers: 4
  temperature: 0.07
  weight_decay: 0.0
  use_scheduler: true
  eval_every: 1
runner:
  module: omniprobe.scripts.eval_correspondence_linear_probe_soco
  required_output: dense
