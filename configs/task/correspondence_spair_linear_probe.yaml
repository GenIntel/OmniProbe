name: correspondence_spair_linear_probe
random_seed: 8
split: test
image_size: 800
eval_class: all
num_instances: null
eval_num_instances: null
data_root: ${oc.env:SPAIR_ROOT,data/SPair-71k}
use_bbox: false
multilayer: false
note: ""
eval_before_training: false
probe:
  type: linear
  output_dim: null
  hidden_dim: null
  bias: true
  init_mode: identity
train:
  enabled: true
  epochs: 4
  lr: 0.001
  weight_decay: 0.0
  temperature: 0.07
  train_all_classes: true
  num_instances: null
  eval_every: 1
  use_scheduler: true
  batch_size: 32
  num_workers: 4
runner:
  module: omniprobe.scripts.eval_correspondence_linear_probe_spair
  required_output: dense
