defaults:
  - /probe: detection3d_dpt_fpn
  - _self_

# Full Omni3D benchmark: all six datasets, 50 categories.
# Note: the upstream Cube R-CNN recipe used a much larger batch (192) for
# this split; with the default batch of 32 expect to tune lr/iterations.
name: detection3d_omni3d_full
system:
  random_seed: 8
  num_gpus: 4
  port: 12356
dataset_root: ${oc.env:OMNI3D_ROOT,data/omni3d}
datasets:
  train: [SUNRGBD_train, SUNRGBD_val, Hypersim_train, Hypersim_val,
          ARKitScenes_train, ARKitScenes_val, Objectron_train, Objectron_val,
          nuScenes_train, nuScenes_val, KITTI_train, KITTI_val]
  test: [SUNRGBD_test, Hypersim_test, ARKitScenes_test, Objectron_test,
         KITTI_test, nuScenes_test]
  category_names: omni3d      # preset resolved via get_omni3d_categories
  num_classes: null           # derived from category_names when null
solver:
  type: adamw
  base_lr: 0.001
  ims_per_batch: 32          # total batch size across all GPUs
  max_iter: 116000
  steps: [69600, 92800]
  warmup_iters: 5000
  checkpoint_period: 5000
  amp: false
visualize_predictions: false  # render 3D cuboid predictions during evaluation
test:
  eval_period: 29000         # 0 disables intermediate evaluation
freeze_backbone: true
pixel_norm: cubercnn         # cubercnn | backbone
stabilize: 0.02              # divergence tolerance; 0 disables retry machinery
max_attempts: 10
eval_only: false
resume: false
weights: ""                  # checkpoint path for eval_only or fine-tuning
d2_overrides: []             # raw detectron2 "KEY value" pairs (escape hatch)
runner:
  module: omniprobe.scripts.train_detection3d_omni3d
  required_output: dense
  require_multilayer: true
