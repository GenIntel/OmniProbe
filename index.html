<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniProbe: Vision Foundation Model Evaluation Results</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #fafbfc;
  color: #1a1a2e;
  line-height: 1.5;
  padding: 0;
}

.header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 2rem 2rem 1.5rem;
  margin-bottom: 0;
}

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 0.25rem;
}

.header .subtitle {
  font-size: 0.95rem;
  color: #64748b;
}

.controls {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.control-row {
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}

.control-row:last-child {
  margin-bottom: 0;
}

.control-label {
  font-size: 0.8rem;
  font-weight: 600;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  min-width: 80px;
}

.tab-group {
  display: flex;
  gap: 0.25rem;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 0.35rem 0.75rem;
  border: 1px solid #e2e8f0;
  background: #fff;
  color: #475569;
  font-size: 0.8rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab-btn:hover {
  background: #f1f5f9;
  border-color: #cbd5e1;
}

.tab-btn.active {
  background: #1a1a2e;
  color: #fff;
  border-color: #1a1a2e;
}

.model-controls {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}

.preset-btn {
  padding: 0.3rem 0.65rem;
  border: 1px solid #cbd5e1;
  background: #f8fafc;
  color: #475569;
  font-size: 0.75rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}

.preset-btn:hover {
  background: #e2e8f0;
}

.preset-btn.active {
  background: #3b82f6;
  color: #fff;
  border-color: #3b82f6;
}

.model-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  max-height: 140px;
  overflow-y: auto;
  padding: 0.25rem 0;
}

.model-chip {
  padding: 0.2rem 0.55rem;
  border: 1px solid #e2e8f0;
  background: #fff;
  color: #64748b;
  font-size: 0.72rem;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  white-space: nowrap;
}

.model-chip:hover {
  border-color: #94a3b8;
}

.model-chip.selected {
  background: #eff6ff;
  border-color: #3b82f6;
  color: #1e40af;
}

.model-chip.is-main {
  font-weight: 600;
}

.content {
  padding: 1.5rem 2rem;
}

.task-info {
  margin-bottom: 1rem;
  display: flex;
  align-items: baseline;
  gap: 1rem;
}

.task-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: #1a1a2e;
}

.task-meta {
  font-size: 0.8rem;
  color: #94a3b8;
}

.table-wrap {
  overflow-x: auto;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 6px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

thead th {
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
  padding: 0.6rem 0.9rem;
  text-align: left;
  font-weight: 600;
  color: #475569;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  position: relative;
}

thead th:hover {
  background: #f1f5f9;
}

thead th .sort-arrow {
  margin-left: 0.3rem;
  font-size: 0.7rem;
  color: #94a3b8;
}

thead th.sorted-asc .sort-arrow::after { content: " \25B2"; color: #3b82f6; }
thead th.sorted-desc .sort-arrow::after { content: " \25BC"; color: #3b82f6; }

thead th .dir-hint {
  display: block;
  font-size: 0.65rem;
  font-weight: 400;
  color: #94a3b8;
}

tbody tr {
  border-bottom: 1px solid #f1f5f9;
}

tbody tr:hover {
  background: #fafbfe;
}

tbody tr.is-main-model {
  background: #fefce8;
}

tbody tr.is-main-model:hover {
  background: #fef9c3;
}

td {
  padding: 0.5rem 0.9rem;
  white-space: nowrap;
}

td.model-name {
  font-weight: 500;
  color: #1a1a2e;
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 1;
}

td.best-val {
  font-weight: 700;
  color: #1e40af;
}

.no-data {
  padding: 3rem;
  text-align: center;
  color: #94a3b8;
  font-size: 0.9rem;
}


.footer {
  padding: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: #94a3b8;
  border-top: 1px solid #e2e8f0;
  margin-top: 2rem;
}

@media (max-width: 768px) {
  .header, .controls, .content { padding-left: 1rem; padding-right: 1rem; }
}
</style>
</head>

</div>

<div class="content" id="content">
  <div class="no-data">Select a task to view results.</div>
</div>

<div class="footer">

let currentGroup = null;
let currentTask = null;
let selectedModels = new Set();
let sortCol = null;
let sortAsc = true;

// Initialization
function init() {
  // Default: select main models
  for (const [name, info] of Object.entries(DATA.models)) {
    if (info.is_main) selectedModels.add(name);
  }

  renderGroupTabs();
  // Select first group
  const firstGroup = Object.keys(DATA.groups)[0];
  selectGroup(firstGroup);
}

function renderGroupTabs() {
  const container = document.getElementById("group-tabs");
  container.innerHTML = "";
  for (const [gid, gname] of Object.entries(DATA.groups)) {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (gid === currentGroup ? " active" : "");
    btn.textContent = gname;
    btn.onclick = () => selectGroup(gid);
    container.appendChild(btn);
  }
}

function selectGroup(gid) {
  currentGroup = gid;
  renderGroupTabs();
  // Find tasks in this group
  const taskIds = Object.keys(DATA.tasks).filter(t => DATA.tasks[t].group === gid);
  renderTaskTabs(taskIds);
  if (taskIds.length > 0) {
    selectTask(taskIds[0]);
  } else {
    currentTask = null;
    renderContent();
  }
}

function renderTaskTabs(taskIds) {
  const container = document.getElementById("task-tabs");
  container.innerHTML = "";
  for (const tid of taskIds) {
    const t = DATA.tasks[tid];
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (tid === currentTask ? " active" : "");
    btn.textContent = t.display;
    btn.onclick = () => selectTask(tid);
    container.appendChild(btn);
  }
}

function selectTask(tid) {
  currentTask = tid;
  sortCol = null;
  sortAsc = true;
  // Re-render task tabs to show active
  const taskIds = Object.keys(DATA.tasks).filter(t => DATA.tasks[t].group === currentGroup);
  renderTaskTabs(taskIds);
  renderModelChips();
  renderContent();
}

function renderModelChips() {
  const container = document.getElementById("model-chips");
  container.innerHTML = "";
  if (!currentTask) return;

  const task = DATA.tasks[currentTask];
  // Show models that have data for this task, plus main models always
  const availableModels = new Set(Object.keys(task.results));

  // Sort: main models first, then alphabetical
  const sortedNames = Object.keys(DATA.models).filter(
    n => availableModels.has(n)
  ).sort((a, b) => {
    const aMain = DATA.models[a].is_main ? 0 : 1;
    const bMain = DATA.models[b].is_main ? 0 : 1;
    if (aMain !== bMain) return aMain - bMain;
    return a.localeCompare(b);
  });

  for (const name of sortedNames) {
    const chip = document.createElement("span");
    chip.className = "model-chip"
      + (selectedModels.has(name) ? " selected" : "")
      + (DATA.models[name].is_main ? " is-main" : "");
    chip.textContent = name;
    chip.onclick = () => {
      if (selectedModels.has(name)) {
        selectedModels.delete(name);
      } else {
        selectedModels.add(name);
      }
      renderModelChips();
      renderContent();
    };
    container.appendChild(chip);
  }

  updatePresetButtons();
}

function updatePresetButtons() {
  const mainNames = Object.keys(DATA.models).filter(n => DATA.models[n].is_main);
  const allMain = mainNames.every(n => selectedModels.has(n));
  document.getElementById("btn-main").classList.toggle("active", allMain && selectedModels.size === mainNames.length);

  const allModels = Object.keys(DATA.models);
  document.getElementById("btn-all").classList.toggle("active", allModels.every(n => selectedModels.has(n)));
}

function selectMainModels() {
  selectedModels.clear();
  for (const [name, info] of Object.entries(DATA.models)) {
    if (info.is_main) selectedModels.add(name);
  }
  renderModelChips();
  renderContent();
}

function selectAllModels() {
  for (const name of Object.keys(DATA.models)) {
    selectedModels.add(name);
  }
  renderModelChips();
  renderContent();
}

function selectNone() {
  selectedModels.clear();
  renderModelChips();
  renderContent();
}

function renderContent() {
  const container = document.getElementById("content");
  if (!currentTask) {
    container.innerHTML = '<div class="no-data">Select a task to view results.</div>';
    return;
  }

  const task = DATA.tasks[currentTask];
  const metricKeys = Object.keys(task.metrics_meta);

  // Filter to selected models that have data
  const models = Object.keys(task.results).filter(n => selectedModels.has(n));

  if (models.length === 0) {
    container.innerHTML = `
      <div class="task-info"><span class="task-title">${task.display}</span></div>
      <div class="no-data">No models selected, or no data available for selected models.</div>`;
    return;
  }

  // Compute best per metric
  const best = {};
  for (const mk of metricKeys) {
    const hb = task.metrics_meta[mk].higher_better;
    let bestVal = null;
    for (const m of models) {
      const v = task.results[m]?.[mk];
      if (v == null) continue;
      if (bestVal == null || (hb ? v > bestVal : v < bestVal)) bestVal = v;
    }
    best[mk] = bestVal;
  }

  // Sort
  let sortedModels = [...models];
  if (sortCol !== null) {
    if (sortCol === "__model__") {
      sortedModels.sort((a, b) => sortAsc ? a.localeCompare(b) : b.localeCompare(a));
    } else {
      sortedModels.sort((a, b) => {
        const va = task.results[a]?.[sortCol] ?? null;
        const vb = task.results[b]?.[sortCol] ?? null;
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        return sortAsc ? va - vb : vb - va;
      });
    }
  }

  // Count visible models
  const nModels = sortedModels.length;
  const nMetrics = metricKeys.length;

  let html = `
    <div class="task-info">
      <span class="task-title">${task.display}</span>
      <span class="task-meta">${nModels} models, ${nMetrics} metric${nMetrics > 1 ? "s" : ""}</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>`;

  // Model header
  const modelSortClass = sortCol === "__model__" ? (sortAsc ? "sorted-asc" : "sorted-desc") : "";
  html += `<th class="${modelSortClass}" onclick="doSort('__model__')">Model<span class="sort-arrow"></span></th>`;

  for (const mk of metricKeys) {
    const meta = task.metrics_meta[mk];
    const cls = sortCol === mk ? (sortAsc ? "sorted-asc" : "sorted-desc") : "";
    const dir = meta.higher_better ? "higher is better" : "lower is better";
    html += `<th class="${cls}" onclick="doSort('${mk}')">${mk}<span class="dir-hint">${dir}</span><span class="sort-arrow"></span></th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const modelName of sortedModels) {
    const isMain = DATA.models[modelName]?.is_main;
    html += `<tr class="${isMain ? "is-main-model" : ""}">`;
    html += `<td class="model-name">${modelName}</td>`;
    for (const mk of metricKeys) {
      const v = task.results[modelName]?.[mk];
      if (v == null) {
        html += `<td style="color:#cbd5e1;">--</td>`;
      } else {
        const isBest = v === best[mk];
        html += `<td class="${isBest ? "best-val" : ""}">${v}</td>`;
      }
    }
    html += `</tr>`;
  }

  html += `</tbody></table></div>`;

  container.innerHTML = html;
}

function doSort(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    // Default sort direction: descending for metrics (show best first), ascending for model name
    if (col === "__model__") {
      sortAsc = true;
    } else {
      const task = DATA.tasks[currentTask];
      const meta = task.metrics_meta[col];
      // Default: best first. If higher_better, descending. If lower_better, ascending.
      sortAsc = !meta.higher_better;
    }
  }
  renderContent();
}

init();
</script>
