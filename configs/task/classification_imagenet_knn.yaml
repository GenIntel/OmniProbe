name: classification_imagenet_knn
data_root: ${oc.env:IMAGENET_ROOT,data/imagenet}
train_split: ordered_train
val_split: ordered
image_size: 224
batch_size: 256
num_workers: 8
knn_k: [20, 100, 200]
temperature: 0.07
output_preference: [cls, gap]  # tried in order; first output the backbone supports is used for kNN
