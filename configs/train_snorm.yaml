system:
  random_seed: 8
  num_gpus: 1
  port: 12355
note: ""
batch_size: 8
defaults:
  - optimizer: ten_epoch
  - backbone: dinov2_b14
  - dataset: nyu
  - probe: snorm_dpt
  - _self_

task_name: snorm

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${task_name}_${hydra:runtime.choices.backbone}
